name: Branch Protection Drift Check

# Verifies that the live GitHub branch-protection rules on `main` and
# `release` match the documented values in `docs/runbooks/branch-protection.md`.
# If they drift, this check fails so a human re-applies (or knowingly
# updates) the rules.
#
# The check requires a token with `administration:read` scope on the repo
# (GITHUB_TOKEN does not have enough scope). Provide it as a repo secret
# named `BRANCH_PROTECTION_TOKEN`. If the secret is unset the job exits
# with a warning — it fails **open**, not closed.

on:
  pull_request:
    paths:
      - ".github/workflows/test.yml"
      - ".github/workflows/docker.yml"
      - ".github/workflows/branch-protection-check.yml"
      - "docs/runbooks/branch-protection.md"
  schedule:
    # Weekly drift check, Monday 14:00 UTC.
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify branch protection matches runbook
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify drift
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::BRANCH_PROTECTION_TOKEN secret is not set."
            echo "::warning::Skipping drift check — cannot read branch protection without admin scope."
            echo "::warning::See docs/runbooks/branch-protection.md § Known limitations."
            exit 0
          fi

          # Expected required checks, kept in sync with
          # docs/runbooks/branch-protection.md.
          expected_main_checks=(
            "Lint & Security Audit"
            "Backend Tests (Shard 1/4)"
            "Backend Tests (Shard 2/4)"
            "Backend Tests (Shard 3/4)"
            "Backend Tests (Shard 4/4)"
            "Integration & Migration Tests"
            "API Contract Validation"
            "Docker Compose Smoke Test"
            "Frontend Tests (Shard 1/2)"
            "Frontend Tests (Shard 2/2)"
            "Frontend Build"
            "E2E Tests (Shard 1/3)"
            "E2E Tests (Shard 2/3)"
            "E2E Tests (Shard 3/3)"
          )

          fail=0

          check_branch() {
            local branch="$1"
            shift
            local -a expected=("$@")

            echo "::group::Branch: ${branch}"

            local payload
            if ! payload=$(gh api "repos/${REPO}/branches/${branch}/protection" 2>&1); then
              echo "::error::Could not fetch protection for ${branch}: ${payload}"
              fail=1
              echo "::endgroup::"
              return
            fi

            # Extract each boolean-ish setting. Tolerate both shapes GitHub
            # has used historically (required_signatures as a bool or
            # .enabled sub-field).
            local linear_history enforce_admins force_push deletions convo reviews signatures

            linear_history=$(jq -r '.required_linear_history.enabled // false' <<<"${payload}")
            enforce_admins=$(jq -r '.enforce_admins.enabled // false' <<<"${payload}")
            force_push=$(jq -r '.allow_force_pushes.enabled // false' <<<"${payload}")
            deletions=$(jq -r '.allow_deletions.enabled // false' <<<"${payload}")
            convo=$(jq -r '.required_conversation_resolution.enabled // false' <<<"${payload}")
            reviews=$(jq -r '.required_pull_request_reviews.required_approving_review_count // 0' <<<"${payload}")
            signatures=$(jq -r '.required_signatures.enabled // .required_signatures // false' <<<"${payload}")

            [ "${linear_history}" = "true" ] || { echo "::error::${branch}: required_linear_history must be true"; fail=1; }
            [ "${enforce_admins}" = "true" ]  || { echo "::error::${branch}: enforce_admins must be true"; fail=1; }
            [ "${force_push}"     = "false" ] || { echo "::error::${branch}: allow_force_pushes must be false"; fail=1; }
            [ "${deletions}"      = "false" ] || { echo "::error::${branch}: allow_deletions must be false"; fail=1; }
            [ "${convo}"          = "true" ]  || { echo "::error::${branch}: required_conversation_resolution must be true"; fail=1; }
            [ "${signatures}"     = "true" ]  || { echo "::error::${branch}: required_signatures must be true"; fail=1; }

            if [ "${reviews}" -lt 1 ]; then
              echo "::error::${branch}: required_approving_review_count must be >= 1 (got ${reviews})"
              fail=1
            fi

            # Compare required status check contexts.
            local actual
            actual=$(jq -r '.required_status_checks.contexts[]? // empty' <<<"${payload}" | sort -u)

            local want
            want=$(printf '%s\n' "${expected[@]}" | sort -u)

            if ! diff <(echo "${actual}") <(echo "${want}") >/dev/null; then
              echo "::error::${branch}: required status checks drift"
              echo "--- expected"
              echo "${want}"
              echo "+++ actual"
              echo "${actual}"
              fail=1
            fi

            echo "::endgroup::"
          }

          check_branch main "${expected_main_checks[@]}"

          # release additionally requires the Docker build + Trivy checks.
          expected_release_checks=(
            "${expected_main_checks[@]}"
            "Build & Push Images"
            "Trivy Container Scan"
          )
          check_branch release "${expected_release_checks[@]}"

          if [ "${fail}" -ne 0 ]; then
            echo "::error::Branch protection has drifted from docs/runbooks/branch-protection.md."
            echo "::error::Either re-apply the rules (see the runbook) or update both the runbook and this workflow in the same PR."
            exit 1
          fi

          echo "Branch protection matches the runbook."
