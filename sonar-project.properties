sonar.organization=jtn0123ismysonar
sonar.projectKey=jtn0123_satellite_processor
sonar.sources=backend/app,frontend/src,satellite_processor/core
sonar.tests=backend/tests,satellite_processor/core/tests,frontend/src/test
sonar.test.inclusions=**/test_*.py,**/tests/**,**/*.test.tsx,**/*.test.ts,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/build/**,src/**,receiver/**,*.html,**/generated-types.ts

# False positive: validate_safe_path IS the path-traversal sanitizer
# (resolves + prefix-checks the path). SonarCloud flags the Path() constructor
# but doesn't trace through to the containment check that follows.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=pythonsecurity:S6549
sonar.issue.ignore.multicriteria.e1.resourceKey=backend/app/errors.py

# Python coverage
sonar.python.coverage.reportPaths=backend/coverage.xml,core-coverage.xml,backend/integration-coverage.xml

# JavaScript/TypeScript coverage
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
